<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Plateforme Taxes Locatives</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 30%, #1a237e 60%, #0d47a1 100%);
        }
        
        .container {
            max-width: 440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 28px;
            padding: 50px 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            animation: fadeUp 0.8s ease;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }
        
        .logo h1 {
            font-size: 24px;
            color: #1a237e;
            font-weight: 700;
        }
        
        .logo p {
            font-size: 14px;
            color: #888;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e4e8;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8fafc;
        }
        
        .form-group input:focus {
            border-color: #1a237e;
            outline: none;
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.1);
            background: white;
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a237e, #1976d2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(26, 35, 126, 0.35);
        }
        
        .links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eef2f6;
        }
        
        .links a {
            color: #1a237e;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .links p {
            color: #888;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .links p a {
            font-weight: 600;
        }
        
        @media (max-width: 480px) {
            .container { padding: 35px 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="icon">🔐</span>
            <h1>Connexion</h1>
            <p>Accédez à votre compte</p>
        </div>
        
        <form action="/login" method="post">
            <div class="form-group">
                <label for="email">Email professionnel</label>
                <input type="email" id="email" name="email" placeholder="exemple@municipalite.tn" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">Se connecter</button>
        </form>
        
        <div class="links">
            <p>Vous n'avez pas de compte ? <a href="/register">S'inscrire</a></p>
        </div>
    </div>
</body>
</html>
